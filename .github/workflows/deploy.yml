name: Deploy
on:
  push:
    branches: [main, project/auth]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 下载 GeoLite2 离线 IP 库
        run: |
          curl -sL -o /tmp/GeoLite2-City.tar.gz \
            "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-City&license_key=${{ secrets.MAXMIND_LICENSE_KEY }}&suffix=tar.gz"
          tar xzf /tmp/GeoLite2-City.tar.gz -C /tmp
          mkdir -p GeoIP
          cp /tmp/GeoLite2-City_*/GeoLite2-City.mmdb GeoIP/
          echo "数据库大小: $(ls -lh GeoIP/GeoLite2-City.mmdb | awk '{print $5}')"

      - name: 打包代码
        run: tar czf deploy.tar.gz $(git ls-files) GeoIP/

      - name: 部署到服务器
        run: |
          sudo apt-get install -qq -y sshpass
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" scp -o StrictHostKeyChecking=no deploy.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/deploy.tar.gz
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            rm -rf /opt/lujiesheng/Portfolio /opt/lujiesheng/Auth /opt/lujiesheng/GeoIP
            tar xzf /tmp/deploy.tar.gz -C /opt/lujiesheng
            rm /tmp/deploy.tar.gz
            cd /opt/lujiesheng
            docker compose up --build -d portfolio auth
            docker image prune -f
          '
