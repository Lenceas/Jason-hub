name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 打包代码
        run: tar czf deploy.tar.gz $(git ls-files)

      - name: 配置 SSH 并部署
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key deploy.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/deploy.tar.gz

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            rm -rf /opt/lujiesheng/Portfolio
            tar xzf /tmp/deploy.tar.gz -C /opt/lujiesheng
            rm /tmp/deploy.tar.gz
            cd /opt/lujiesheng
            docker compose up --build -d portfolio
            docker image prune -f
          '
